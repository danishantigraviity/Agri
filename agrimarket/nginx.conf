# /etc/nginx/sites-available/agrimarket

upstream agrimarket_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.agrimarket.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.agrimarket.com;

    # SSL (use Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/api.agrimarket.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.agrimarket.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Proxy to Node.js
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass         http://agrimarket_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    # Stricter rate limit for auth
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass         http://agrimarket_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Razorpay webhook — no rate limiting
    location /api/payments/webhook {
        proxy_pass         http://agrimarket_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Block common attack paths
    location ~* (\.env|\.git|wp-admin|phpinfo) {
        return 404;
    }

    # Logging
    access_log /var/log/nginx/agrimarket_access.log;
    error_log  /var/log/nginx/agrimarket_error.log warn;
}
